# docker-compose.evolution.yml
# Infraestrutura local para Evolution API (WhatsApp Gateway)
# Uso: npm run evolution:start
#
# Pré-requisito: copiar .env.evolution.example para .env.evolution e preencher.
# Os dados ficam em volumes Docker nomeados (persistência entre reinicializações).

version: "3.8"

services:
  evolution-api:
    container_name: clinica_evolution_api
    image: evoapicloud/evolution-api:latest
    restart: unless-stopped
    depends_on:
      evolution-postgres:
        condition: service_healthy
      evolution-redis:
        condition: service_started
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    env_file:
      - .env.evolution
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5

  evolution-redis:
    container_name: clinica_evolution_redis
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --port 6379
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net
    expose:
      - "6379"

  evolution-postgres:
    container_name: clinica_evolution_postgres
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD:-evolution_secret_change_me}
    volumes:
      - evolution_postgres:/var/lib/postgresql/data
    networks:
      - evolution-net
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution_instances:
    name: clinica_evolution_instances
  evolution_redis:
    name: clinica_evolution_redis
  evolution_postgres:
    name: clinica_evolution_postgres

networks:
  evolution-net:
    name: clinica_evolution_net
    driver: bridge
